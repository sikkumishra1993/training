name: Sync OCM Credentials

# Fetches OCM credentials from the Digital DevOps Key Vault (XXXXXXXX)
# and writes them to our Digital Core Key Vault (XXXXXXXXXx).
# Triggered manually or can be scheduled as needed.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment to sync credentials'
        required: true
        type: choice
        options:
          - non-prod
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  sync:
    name: Sync OCM Credentials to ${{ github.event.inputs.environment }} Key Vault
    runs-on: ubuntu-latest
    
    env:
      # EXTERNAL_KEY_VAULT: kvxxxxint
      TARGET_KEY_VAULT: ${{ github.event.inputs.environment == 'prod' && 'kvxxxxprod' || 'kvxxxxnp' }}
      AZURE_CLIENT_ID: ${{ github.event.inputs.environment == 'prod' && secrets.AZURE_CLIENT_ID_PROD || secrets.AZURE_CLIENT_ID_NONPROD }}
      AZURE_TENANT_ID: ${{ github.event.inputs.environment == 'prod' && secrets.AZURE_TENANT_ID_PROD || secrets.AZURE_TENANT_ID_NONPROD }}
      AZURE_SUBSCRIPTION_ID: ${{ github.event.inputs.environment == 'prod' && secrets.AZURE_SUBSCRIPTION_ID_PROD || secrets.AZURE_SUBSCRIPTION_ID_NONPROD }}

    steps:
      # - name: Azure Login — External Key Vault Access (OIDC)
      #   uses: azure/login@v2
      #   with:
      #     creds: ${{ secrets.DIGITAL_AZURE_DEVOPS_CREDENTIALS }}

      - name: Azure Login — Our Subscription (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch OSD Secrets from Key Vault
        id: kv-secrets
        uses: azure/get-keyvault-secrets@v1
        with:
          keyvault: ${{ env.TARGET_KEY_VAULT }}
          secrets: 'OCM-CLIENT-ID,OCM-CLIENT-SECRET'

      # Export OSD provider credentials as environment variables
      # These are consumed by the osdgoogle provider: OSDGOOGLE_CLIENT_ID / OSDGOOGLE_CLIENT_SECRET
      - name: Set OSD Provider Environment Variables
        run: |
          echo "ocm_client_id=${{ steps.kv-secrets.outputs.OCM-CLIENT-ID }}" >> $GITHUB_ENV
          echo "ocm_client_secret=${{ steps.kv-secrets.outputs.OCM-CLIENT-SECRET }}" >> $GITHUB_ENV
